suite: test temporary volume rendering
templates:
  - deployment.yaml
  - statefulset.yaml
  - temp-pvc.yaml
  - configmap.yaml
  - secret.yaml
  - secret-signing-key.yaml
tests:
  # emptyDir tests
  - it: should use emptyDir for tmp volume by default (StatefulSet)
    template: statefulset.yaml
    set:
      config.hostname: test.example.com
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}

  - it: should use emptyDir for tmp volume by default (Deployment)
    template: deployment.yaml
    set:
      mode: deployment
      config.hostname: test.example.com
      config.storage.type: s3
      config.storage.s3.bucket: my-bucket
      config.storage.s3.endpoint: https://s3.amazonaws.com
      config.storage.s3.accessKeyId: test-key
      config.storage.s3.secretAccessKey: test-secret
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}

  - it: should configure emptyDir with custom options
    template: statefulset.yaml
    set:
      config.hostname: test.example.com
      config.cache.tempVolume.emptyDir:
        medium: Memory
        sizeLimit: 4Gi
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir:
              medium: Memory
              sizeLimit: 4Gi

  # PVC tests
  - it: should NOT include tmp volume in spec.template.spec.volumes when type is pvc with NO existing claim (StatefulSet)
    template: statefulset.yaml
    set:
      config.hostname: test.example.com
      config.cache.tempVolume.type: pvc
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: tmp

  - it: should use volumeClaimTemplate for tmp volume when type is pvc with NO existing claim (StatefulSet)
    template: statefulset.yaml
    set:
      config.hostname: test.example.com
      config.cache.tempVolume.type: pvc
    asserts:
      - contains:
          path: spec.volumeClaimTemplates
          content:
            metadata:
              name: tmp
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi

  - it: should use existing PVC in volumes when type is pvc with existing claim (StatefulSet)
    template: statefulset.yaml
    set:
      config.hostname: test.example.com
      config.cache.tempVolume.type: pvc
      config.cache.tempVolume.pvc.existingClaim: my-existing-pvc
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            persistentVolumeClaim:
              claimName: my-existing-pvc
      - notContains:
          path: spec.volumeClaimTemplates
          content:
            metadata:
              name: tmp

  - it: should use PVC in volumes for tmp volume when type is pvc (Deployment)
    template: deployment.yaml
    set:
      mode: deployment
      config.hostname: test.example.com
      config.cache.tempVolume.type: pvc
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            persistentVolumeClaim:
              claimName: RELEASE-NAME-ncps-temp

  - it: should create a PVC for tmp storage when type is pvc and no existing claim is provided (Deployment)
    template: temp-pvc.yaml
    set:
      mode: deployment
      config.hostname: test.example.com
      config.cache.tempVolume.type: pvc
      config.cache.tempVolume.pvc.size: 50Gi
      config.cache.tempVolume.pvc.storageClassName: fast-ssd
      config.cache.tempVolume.pvc.annotations:
        custom: annotation
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ncps-temp
      - equal:
          path: spec.resources.requests.storage
          value: "50Gi"
      - equal:
          path: spec.storageClassName
          value: "fast-ssd"
      - equal:
          path: metadata.annotations.custom
          value: "annotation"

  - it: should NOT create a PVC for tmp storage in StatefulSet mode
    template: temp-pvc.yaml
    set:
      mode: statefulset
      config.hostname: test.example.com
      config.cache.tempVolume.type: pvc
    asserts:
      - hasDocuments:
          count: 0

  - it: should use existing claim for tmp volume and NOT create a new PVC
    template: statefulset.yaml
    set:
      config.hostname: test.example.com
      config.cache.tempVolume.type: pvc
      config.cache.tempVolume.pvc.existingClaim: my-existing-pvc
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            persistentVolumeClaim:
              claimName: my-existing-pvc

  - it: should not create a PVC for tmp storage when existing claim is provided
    template: temp-pvc.yaml
    set:
      mode: deployment
      config.hostname: test.example.com
      config.cache.tempVolume.type: pvc
      config.cache.tempVolume.pvc.existingClaim: my-existing-pvc
    asserts:
      - hasDocuments:
          count: 0

  - it: should include annotations and selector in volumeClaimTemplate for tmp (StatefulSet)
    template: statefulset.yaml
    set:
      config.hostname: test.example.com
      config.cache.tempVolume.type: pvc
      config.cache.tempVolume.pvc.annotations:
        custom: annotation
      config.cache.tempVolume.pvc.selector:
        matchLabels:
          app: ncps
    asserts:
      - contains:
          path: spec.volumeClaimTemplates
          content:
            metadata:
              name: tmp
              annotations:
                custom: annotation
            spec:
              selector:
                matchLabels:
                  app: ncps
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
