suite: test migrate-nar-to-chunks job rendering
templates:
  - migrate-nar-to-chunks-job.yaml
  - configmap.yaml
  - secret.yaml
tests:
  - it: should not create the job by default
    template: migrate-nar-to-chunks-job.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a Job when enabled
    template: migrate-nar-to-chunks-job.yaml
    set:
      migrateNarToChunks.enabled: true
      config.hostname: test.example.com
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ncps-migrate-nar-to-chunks
      - isNull:
          path: metadata.annotations["helm.sh/hook"]
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - --config
            - /etc/ncps/config.yaml
            - migrate-nar-to-chunks
            - --concurrency
            - "10"

  - it: should add --dry-run when enabled
    template: migrate-nar-to-chunks-job.yaml
    set:
      migrateNarToChunks.enabled: true
      migrateNarToChunks.dryRun: true
      config.hostname: test.example.com
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --dry-run

  - it: should not contain --force-reclaim
    template: migrate-nar-to-chunks-job.yaml
    set:
      migrateNarToChunks.enabled: true
      config.hostname: test.example.com
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --force-reclaim

  - it: should set ttlSecondsAfterFinished
    template: migrate-nar-to-chunks-job.yaml
    set:
      migrateNarToChunks.enabled: true
      config.hostname: test.example.com
    asserts:
      - equal:
          path: spec.ttlSecondsAfterFinished
          value: 3600
