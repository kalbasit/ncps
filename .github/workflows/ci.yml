name: CI
# Thin caller of kalbasit/gh-actions' reusable CI workflow plus ncps-specific
# sibling jobs (database codegen, docs deploy) that don't generalize across
# the other consumers.
#
# Pinned to @main while iterating; will repin to @v0.1.0 once tagged.
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: write
jobs:
  shared:
    uses: kalbasit/gh-actions/.github/workflows/ci.yml@main
    with:
      cachix_cache: ncps
      oci: true
      primary_package: ncps
      dockerhub_image: kalbasit/ncps
      dockerhub_username: ${{ vars.DOCKERHUB_USERNAME }}
      # Integration cohorts (Garage/Postgres/MySQL/Redis) are
      # architecture-independent, so validate them — and coverage — on
      # x86_64-linux only. The aarch64-linux leg still builds/pushes its OCI
      # image for the multi-arch manifest, but no longer re-runs the suite on
      # the slower ARM runner where Postgres times out. See OpenSpec change
      # speed-up-ci; requires kalbasit/gh-actions test_systems input.
      test_systems: '["x86_64-linux"]'
      # The shared build job no longer runs the monolithic `nix flake check` or
      # coverage; the `check-matrix`/`checks`/`coverage` jobs below fan each
      # check out into its own parallel runner instead (much lower wall-clock).
      # The shared build job still builds/pushes the OCI image per arch.
      run_flake_check: false
      languages: |
        {"go":{"targets":[
          {"attr":"ncps",                                        "file":"nix/packages/ncps/default.nix"},
          {"attr":"ncps-checktools",                             "file":"nix/packages/ncps-checktools/default.nix"},
          {"attr":"checks.x86_64-linux.ent-codegen-drift-check", "file":"nix/checks/flake-module.nix"}
        ]}}
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      gha_pat_token: ${{ secrets.GHA_PAT_TOKEN }}
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
  # ---- Fanned-out flake checks -----------------------------------------------------
  # Instead of one `nix flake check` building every check derivation on a single
  # contended runner, enumerate the checks and run each as its own parallel job.
  # Wall-clock collapses to the slowest single check + nix setup. Each job pulls
  # the shared compile cache (_ncps-test-cache/_ncps-base) from Cachix rather than
  # rebuilding it. See OpenSpec change fan-out-flake-check.
  check-matrix:
    runs-on: ubuntu-24.04
    outputs:
      checks: ${{ steps.list.outputs.checks }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ncps
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Enumerate checks
        id: list
        run: |
          echo "checks=$(nix eval .#checks.x86_64-linux --apply builtins.attrNames --json)" >> "$GITHUB_OUTPUT"
  checks:
    needs: check-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        check: ${{ fromJson(needs.check-matrix.outputs.checks) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ncps
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build check
        # Pass the matrix value via env, not direct `${{ }}` expansion into the
        # shell: on fork PRs the check names come from `builtins.attrNames` over
        # the attacker-controlled flake, so interpolating them into `run:` would
        # be a template-injection vector. Quoted env reference treats it as data.
        env:
          CHECK: ${{ matrix.check }}
        run: nix build ".#checks.x86_64-linux.$CHECK" -L
  coverage:
    needs: checks
    # Coverage is informational (not a gate) and needs the Codecov token, so skip
    # it on fork PRs. Merges the per-cohort cover.out (built by the `checks` jobs
    # and pulled from Cachix) into one profile.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ncps
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build coverage
        run: nix build ".#ncps.coverage" -L
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: result-coverage
  # ---- ncps-specific sibling jobs --------------------------------------------------
  # These stay here because they don't generalize across the other consumers.
  # They run their own paths-filter because the reusable workflow doesn't (currently)
  # expose its filter outputs back to the caller.
  filter:
    runs-on: ubuntu-24.04
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      ent: ${{ steps.filter.outputs.ent }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            ent:
              - "ent/schema/**"
              - "ent/generate.go"
              - "go.mod"
              - "go.sum"
            docs:
              - "docs/**"
  generate-database:
    needs: filter
    # Vendor-hash regeneration moved to gh-actions/generate.yml via the shared
    # workflow's `languages.go.targets`. This job now only handles Ent codegen.
    if: (github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)) && needs.filter.outputs.ent == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GHA_PAT_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ncps
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Regenerate Ent code
        run: nix develop --command go generate ./ent/...
      - name: Format Code
        run: nix fmt
      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "Auto Regenerate Ent Code"
  deploy-docs-pages:
    permissions:
      contents: read
      pull-requests: write
    needs: filter
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)) && needs.filter.outputs.docs == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ncps
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build docs
        run: nix develop --command bash -c trilium-build-docs
      - name: Deploy docs
        id: deploy-docs-pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CF_NCPS_DEV_EDIT_WORKERS_TOKEN }}
          accountId: ${{ secrets.CF_NCPS_DEV_ACCOUNT_ID }}
          command: pages deploy public/docs --project-name=ncps-docs --commit-dirty=true
      - name: Post Pages Deployment URL on the Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Pages deployed to ${{ steps.deploy-docs-pages.outputs.deployment-url }}`
            })
  # ---- Final gate over the reusable workflow + sibling jobs ------------------------
  ci:
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - shared
      - check-matrix
      - checks
      - coverage
      - filter
      - generate-database
      - deploy-docs-pages
    steps:
      - name: Check Workflow Status
        env:
          SHARED_RESULT: ${{ needs.shared.result }}
          CHECK_MATRIX_RESULT: ${{ needs.check-matrix.result }}
          CHECKS_RESULT: ${{ needs.checks.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          FILTER_RESULT: ${{ needs.filter.result }}
          GENERATE_DATABASE_RESULT: ${{ needs.generate-database.result }}
          DEPLOY_DOCS_PAGES_RESULT: ${{ needs.deploy-docs-pages.result }}
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          declare -A results=(
            ["shared"]="$SHARED_RESULT"
            ["check-matrix"]="$CHECK_MATRIX_RESULT"
            ["checks"]="$CHECKS_RESULT"
            ["coverage"]="$COVERAGE_RESULT"
            ["filter"]="$FILTER_RESULT"
            ["generate-database"]="$GENERATE_DATABASE_RESULT"
            ["deploy-docs-pages"]="$DEPLOY_DOCS_PAGES_RESULT"
          )

          failed=0
          for job in "${!results[@]}"; do
            result="${results[$job]}"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::Job '$job' ended with result: $result"
              failed=1
            fi
          done

          if [[ "$failed" -ne 0 ]]; then
            exit 1
          fi

          echo "All jobs passed"
