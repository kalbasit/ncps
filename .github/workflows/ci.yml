name: CI
# Thin caller of kalbasit/gh-actions' reusable CI workflow plus ncps-specific
# sibling jobs (database codegen, docs deploy) that don't generalize across
# the other consumers.
#
# Pinned to @main while iterating; will repin to @v0.1.0 once tagged.
on:
  pull_request:
    branches:
      - main
      - "release-*"
  push:
    branches:
      - main
      - "release-*"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: write
jobs:
  shared:
    uses: kalbasit/gh-actions/.github/workflows/ci.yml@user/wnasreddine/ci-jobs
    with:
      cachix_cache: ncps
      oci: true
      primary_package: ncps
      dockerhub_image: kalbasit/ncps
      dockerhub_username: ${{ vars.DOCKERHUB_USERNAME }}
      languages: |
        {"go":{"targets":[
          {"attr":"ncps",                                        "file":"nix/packages/ncps/default.nix"},
          {"attr":"checks.x86_64-linux.ent-codegen-drift-check", "file":"nix/checks/flake-module.nix"}
        ]}}
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      gha_pat_token: ${{ secrets.GHA_PAT_TOKEN }}
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
  # ---- ncps-specific sibling jobs --------------------------------------------------
  # These stay here because they don't generalize across the other consumers.
  # They run their own paths-filter because the reusable workflow doesn't (currently)
  # expose its filter outputs back to the caller.
  filter:
    runs-on: ubuntu-24.04
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      ent: ${{ steps.filter.outputs.ent }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ent:
              - "ent/schema/**"
              - "ent/generate.go"
            docs:
              - "docs/**"
  generate-database:
    needs: filter
    # Vendor-hash regeneration moved to gh-actions/generate.yml via the shared
    # workflow's `languages.go.targets`. This job now only handles Ent codegen.
    if: (github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)) && needs.filter.outputs.ent == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GHA_PAT_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: ncps
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Regenerate Ent code
        run: nix develop --command go generate ./ent/...
      - name: Format Code
        run: nix fmt
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Auto Regenerate Ent Code"
  deploy-docs-pages:
    permissions:
      contents: read
      pull-requests: write
    needs: filter
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)) && needs.filter.outputs.docs == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: ncps
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build docs
        run: nix develop --command bash -c trilium-build-docs
      - name: Deploy docs
        id: deploy-docs-pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_NCPS_DEV_EDIT_WORKERS_TOKEN }}
          accountId: ${{ secrets.CF_NCPS_DEV_ACCOUNT_ID }}
          command: pages deploy public/docs --project-name=ncps-docs --commit-dirty=true
      - name: Post Pages Deployment URL on the Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Pages deployed to ${{ steps.deploy-docs-pages.outputs.deployment-url }}`
            })
  # ---- Final gate over the reusable workflow + sibling jobs ------------------------
  ci:
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - shared
      - filter
      - generate-database
      - deploy-docs-pages
    steps:
      - name: Check Workflow Status
        env:
          SHARED_RESULT: ${{ needs.shared.result }}
          FILTER_RESULT: ${{ needs.filter.result }}
          GENERATE_DATABASE_RESULT: ${{ needs.generate-database.result }}
          DEPLOY_DOCS_PAGES_RESULT: ${{ needs.deploy-docs-pages.result }}
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          declare -A results=(
            ["shared"]="$SHARED_RESULT"
            ["filter"]="$FILTER_RESULT"
            ["generate-database"]="$GENERATE_DATABASE_RESULT"
            ["deploy-docs-pages"]="$DEPLOY_DOCS_PAGES_RESULT"
          )

          failed=0
          for job in "${!results[@]}"; do
            result="${results[$job]}"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::Job '$job' ended with result: $result"
              failed=1
            fi
          done

          if [[ "$failed" -ne 0 ]]; then
            exit 1
          fi

          echo "All jobs passed"
